name: Windows Build

# Builds the Windows agent (ScreenRecorder.exe) on a windows-latest runner,
# because PyInstaller cannot cross-compile from macOS. Run manually from the
# Actions tab (workflow_dispatch), or push a tag like "win-v1.0.0" to also
# publish a GitHub release with the .exe + PowerShell installer.

on:
  workflow_dispatch:
  push:
    tags:
      - 'win-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-core.txt pyinstaller

      - name: Download static ffmpeg (Windows)
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $exe = Get-ChildItem -Path ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $exe.FullName build_app/ffmpeg.exe -Force
          Write-Host "ffmpeg.exe staged ($([math]::Round((Get-Item build_app/ffmpeg.exe).Length/1MB,1)) MB)"

      - name: Bake provisioning values
        shell: pwsh
        run: |
          $boot = Get-Content bootstrap.sh -Raw
          function Get-Baked($name) {
            $m = [regex]::Match($boot, "(?m)^$name=`"([^`"]*)`"")
            if (-not $m.Success) { throw "Could not find $name in bootstrap.sh" }
            return $m.Groups[1].Value
          }
          $payload = [ordered]@{
            gcreds_b64 = Get-Baked "GDRIVE_CREDENTIALS_B64"
            enckey_b64 = Get-Baked "ENCRYPTION_KEY_B64"
            folder     = Get-Baked "GDRIVE_FOLDER_ID"
            sheet      = Get-Baked "GSHEET_ID"
            client     = Get-Baked "CLIENT_NAME"
          } | ConvertTo-Json -Compress
          Set-Content -Path build_app/_provision.json -Value $payload -Encoding UTF8
          if (-not (Test-Path build_app/_provision.json)) { throw "Failed to write build_app/_provision.json" }

      - name: Build ScreenRecorder.exe
        run: pyinstaller --noconfirm --distpath dist_win --workpath build_win build_app/screenrecorder_win.spec

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item dist_win/ScreenRecorder.exe out/ -Force
          Copy-Item install_windows.ps1 out/ -Force
          Write-Host "ScreenRecorder.exe size: $([math]::Round((Get-Item out/ScreenRecorder.exe).Length/1MB,1)) MB"

      - name: Self-test Windows installer repair path
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dataDir = Join-Path $env:USERPROFILE ".screenrecord"
          $installDir = Join-Path $env:LOCALAPPDATA "ScreenRecorder"
          Remove-Item -Recurse -Force $dataDir, $installDir -ErrorAction SilentlyContinue

          New-Item -ItemType Directory -Force -Path $dataDir | Out-Null
          foreach ($name in @("credentials.json", "encryption.key", "config.yaml")) {
            $path = Join-Path $dataDir $name
            Set-Content -Path $path -Value "locked" -Encoding UTF8
            & attrib.exe +R $path
          }

          $target = "$env:USERDOMAIN\$env:USERNAME"
          pwsh -NoProfile -ExecutionPolicy Bypass -File out/install_windows.ps1 `
            -TargetUser $target `
            -BootstrapFile bootstrap.sh `
            -NoStart

          foreach ($name in @("credentials.json", "encryption.key", "config.yaml")) {
            $path = Join-Path $dataDir $name
            if (-not (Test-Path $path)) { throw "Missing provisioned file: $path" }
            if (((Get-Item $path -Force).Attributes -band [IO.FileAttributes]::ReadOnly) -ne 0) {
              throw "Provisioned file is still read-only: $path"
            }
          }
          if ((Get-Content (Join-Path $dataDir "credentials.json") -Raw).Trim() -eq "locked") {
            throw "credentials.json was not overwritten"
          }
          if (-not (Test-Path (Join-Path $installDir "ScreenRecorder.exe"))) {
            throw "ScreenRecorder.exe was not installed"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScreenRecorder-Windows
          path: out/*

      - name: Publish release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/win-v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            out/ScreenRecorder.exe out/install_windows.ps1 `
            --title "Screen Recorder for Windows $env:GITHUB_REF_NAME" `
            --notes "Unsigned Windows build (gdigrab capture, per-user Run key auto-start). Install with install_windows.ps1."
